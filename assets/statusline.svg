<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="330" viewBox="0 0 1280 330" font-family="ui-monospace, SFMono-Regular, Menlo, 'Cascadia Mono', Consolas, 'Noto Sans Mono CJK KR', monospace">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#20232a"/>
      <stop offset="1" stop-color="#16181d"/>
    </linearGradient>
  </defs>

  <!-- 터미널 창 -->
  <rect x="8" y="8" width="1264" height="314" rx="14" fill="url(#bgGrad)" stroke="#33363e" stroke-width="1.5"/>

  <!-- 타이틀 바 -->
  <circle cx="36" cy="36" r="7" fill="#ff5f57"/>
  <circle cx="60" cy="36" r="7" fill="#febc2e"/>
  <circle cx="84" cy="36" r="7" fill="#28c840"/>
  <text x="640" y="41" font-size="14" fill="#9aa0ab" text-anchor="middle">Claude Code — statusline</text>
  <line x1="8" y1="58" x2="1272" y2="58" stroke="#33363e" stroke-width="1"/>

  <!-- ① 평소 (대기) -->
  <text x="40" y="98" font-size="13" fill="#6b7280"># 평소 — codex/claude 남은 사용량 · 리셋까지 남은 시간</text>
  <text x="40" y="128" font-size="16" xml:space="preserve"><tspan fill="#e8eaed" font-weight="bold">njkim</tspan><tspan fill="#5c626e"> · </tspan><tspan fill="#cf6bdd">Fable 5 (high)</tspan><tspan fill="#5c626e"> · </tspan><tspan fill="#10A37F">codex</tspan><tspan fill="#8a8f99"> ▕</tspan><tspan fill="#10A37F">▆▆▆▆▆▆▆▆▆▆▆▆▆▆▆▆▆▆▆▆</tspan><tspan fill="#8a8f99">▏</tspan><tspan fill="#e8eaed">98%</tspan><tspan fill="#7b8290"> ↻4h2m</tspan><tspan fill="#5c626e"> · </tspan><tspan fill="#D97757">claude</tspan><tspan fill="#8a8f99"> ▕</tspan><tspan fill="#D97757">▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄</tspan><tspan fill="#4a4e57">░░░░░</tspan><tspan fill="#8a8f99">▏</tspan><tspan fill="#e8eaed">76%</tspan><tspan fill="#7b8290"> ↻2h13m</tspan><tspan fill="#5c626e"> · </tspan><tspan fill="#7b8290">◌ codex</tspan></text>
  <text x="1240" y="128" font-size="16" text-anchor="end" xml:space="preserve"><tspan fill="#9aa0ab">컨텍스트</tspan><tspan fill="#8a8f99"> ▕</tspan><tspan fill="#4ec97a">████████</tspan><tspan fill="#4a4e57">░░░░░░░░░░░░</tspan><tspan fill="#8a8f99">▏</tspan><tspan fill="#e8eaed">42%</tspan></text>

  <!-- ② Codex 작업 중 -->
  <text x="40" y="178" font-size="13" fill="#6b7280"># Codex 작업 중 — 스피너 회전(◜◝◞◟) + 진행 중 태스크</text>
  <text x="40" y="208" font-size="16" xml:space="preserve"><tspan fill="#e8eaed" font-weight="bold">njkim</tspan><tspan fill="#5c626e"> · </tspan><tspan fill="#cf6bdd">Fable 5 (high)</tspan><tspan fill="#5c626e"> · </tspan><tspan fill="#10A37F">codex</tspan><tspan fill="#8a8f99"> ▕</tspan><tspan fill="#10A37F">▆▆▆▆▆▆▆▆▆▆▆▆▆▆▆▆▆▆▆▆</tspan><tspan fill="#8a8f99">▏</tspan><tspan fill="#e8eaed">98%</tspan><tspan fill="#5c626e"> · </tspan><tspan fill="#D97757">claude</tspan><tspan fill="#8a8f99"> ▕</tspan><tspan fill="#D97757">▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄</tspan><tspan fill="#4a4e57">░░░░░</tspan><tspan fill="#8a8f99">▏</tspan><tspan fill="#e8eaed">76%</tspan><tspan fill="#5c626e"> · </tspan><tspan fill="#4ec94e" font-weight="bold">◜ codex ×2</tspan><tspan fill="#4ec94e"> 작업중</tspan><tspan fill="#5c626e"> · </tspan><tspan fill="#e5c07b">▸ Codex 구현: 로그인 API</tspan></text>
  <text x="1240" y="208" font-size="16" text-anchor="end" xml:space="preserve"><tspan fill="#9aa0ab">컨텍스트</tspan><tspan fill="#8a8f99"> ▕</tspan><tspan fill="#4ec97a">████████</tspan><tspan fill="#4a4e57">░░░░░░░░░░░░</tspan><tspan fill="#8a8f99">▏</tspan><tspan fill="#e8eaed">42%</tspan></text>

  <!-- ③ 한도 임박 -->
  <text x="40" y="258" font-size="13" fill="#6b7280"># 한도 임박 — 남은 양 30%↓ 노랑, 10%↓ 빨강 / 블록 높이 = 주간 남은 양</text>
  <text x="40" y="288" font-size="16" xml:space="preserve"><tspan fill="#e8eaed" font-weight="bold">njkim</tspan><tspan fill="#5c626e"> · </tspan><tspan fill="#cf6bdd">Fable 5 (high)</tspan><tspan fill="#5c626e"> · </tspan><tspan fill="#10A37F">codex</tspan><tspan fill="#8a8f99"> ▕</tspan><tspan fill="#e5c07b">▂▂▂▂▂▂</tspan><tspan fill="#4a4e57">░░░░░░░░░░░░░░</tspan><tspan fill="#8a8f99">▏</tspan><tspan fill="#e8eaed">28%</tspan><tspan fill="#7b8290"> ↻41m</tspan><tspan fill="#5c626e"> · </tspan><tspan fill="#D97757">claude</tspan><tspan fill="#8a8f99"> ▕</tspan><tspan fill="#e06c75">▂▂</tspan><tspan fill="#4a4e57">░░░░░░░░░░░░░░░░░░</tspan><tspan fill="#8a8f99">▏</tspan><tspan fill="#e8eaed">8%</tspan><tspan fill="#7b8290"> ↻19m</tspan><tspan fill="#5c626e"> · </tspan><tspan fill="#7b8290">◌ codex</tspan></text>
  <text x="1240" y="288" font-size="16" text-anchor="end" xml:space="preserve"><tspan fill="#9aa0ab">컨텍스트</tspan><tspan fill="#8a8f99"> ▕</tspan><tspan fill="#e06c75">██████████████████</tspan><tspan fill="#4a4e57">░░</tspan><tspan fill="#8a8f99">▏</tspan><tspan fill="#e8eaed">93%</tspan></text>
</svg>
